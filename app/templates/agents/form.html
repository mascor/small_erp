{% extends "base.html" %}
{% block title %}{% if agent %}Modifica{% else %}Nuovo{% endif %} Agente — Small ERP{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{% if agent %}Modifica Agente{% else %}Nuovo Agente{% endif %}</h1>
</div>

<div class="card">
  <div class="card-body">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="first_name">Nome <span class="required">*</span></label>
          <input type="text" id="first_name" name="first_name" class="form-control"
                 value="{{ agent.first_name if agent else '' }}" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="last_name">Cognome <span class="required">*</span></label>
          <input type="text" id="last_name" name="last_name" class="form-control"
                 value="{{ agent.last_name if agent else '' }}" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="email">Email / Contatto</label>
          <input type="email" id="email" name="email" class="form-control"
                 value="{{ agent.email if agent else '' }}" placeholder="email@esempio.it">
        </div>
        <div class="form-group">
          <label class="form-label" for="default_percentage">Percentuale Standard (%)</label>
          <input type="text" id="default_percentage" name="default_percentage" class="form-control"
                 value="{{ agent.default_percentage if agent else '0' }}" placeholder="0,00">
          <span class="form-hint">Verrà suggerita automaticamente nelle nuove attività.</span>
        </div>
      </div>

      <div class="form-group">
        <div class="form-check">
          <input type="checkbox" id="is_active" name="is_active"
                 {% if not agent or agent.is_active %}checked{% endif %}>
          <label class="form-label" for="is_active" style="margin-bottom:0">Attivo</label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="notes">Note</label>
        <textarea id="notes" name="notes" class="form-control" rows="2">{{ agent.notes if agent else '' }}</textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">{% if agent %}Salva{% else %}Crea Agente{% endif %}</button>
        <a href="{{ url_for('agents.index') }}" class="btn btn-secondary">Annulla</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
